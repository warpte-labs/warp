<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Warp</title>
  <meta name="description" content="Warp — Grok sidebar agent for VS Code &amp; Cursor" />
  <meta name="theme-color" content="#000000" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="canonical" href="https://warpte.com/" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      min-height: 100vh;
      background: #000;
      color: #111;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 16px;
    }

    /* White paper shell ~90vw, 20px corners over black */
    .shell {
      width: 99vw;
      max-width: none;
      margin: 0 auto;
      min-height: calc(100vh - 32px);
      background: #f4f4f2;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid #e4e4e0;
    }

    .hdr-bar {
      flex-shrink: 0;
      border-bottom: 1px solid #e4e4e0;
    }
    .hdr {
      max-width: 980px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 22px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: #111;
      font-family: ui-monospace, "Cascadia Code", "SF Mono", Consolas, monospace;
      font-size: 13px;
      font-weight: 700;
    }
    .brand-mark {
      width: 20px;
      height: 20px;
      display: block;
      color: #222;
    }
    .hdr-links {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .hdr-links a {
      color: #666;
      text-decoration: none;
      font-size: 13px;
    }
    .hdr-links a:hover { color: #111; }

    .main {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 44px;
      padding: 32px 16px 48px;
    }

    .hero {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      pointer-events: none;
    }
    .hero-svg {
      width: min(600px, 92vw);
      height: auto;
      aspect-ratio: 442 / 230;
      user-select: none;
      overflow: visible;
      pointer-events: auto;
      cursor: default;
      color: #3a3a3a;
    }
    .hero-svg .w-tile {
      fill: #6e6e6e;
    }
    .hero-svg .w-tile.core {
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center;
      transition: transform 140ms cubic-bezier(0.22, 1, 0.36, 1), fill 140ms ease;
    }
    .hero-svg .w-tile.particle {
      fill: #6e6e6e;
      pointer-events: none;
      transition: transform 100ms ease-out;
    }
    @media (prefers-reduced-motion: reduce) {
      .hero-svg .particle-layer { display: none; }
      .hero-svg { pointer-events: none; }
      .hero-svg .w-tile.core { transition: none; }
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 100%;
      position: relative;
    }

    .btn-ide {
      display: inline-flex;
      flex-direction: row;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      font-size: 13px;
      font-weight: 550;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      letter-spacing: -0.01em;
      text-decoration: none;
      border-radius: 8px;
      padding: 10px 16px;
      white-space: nowrap;
      cursor: pointer;
      border: 1px solid #ddd;
      background: #fff;
      color: #111;
      transition: background 0.12s ease, border-color 0.12s ease;
    }
    .btn-ide span {
      text-align: left;
    }
    .btn-ide:hover {
      background: #f0f0ec;
      border-color: #ccc;
    }
    .btn-ide svg {
      width: 18px;
      height: 18px;
      display: block;
      flex-shrink: 0;
    }
    .btn-ide.cursor svg {
      width: 15px;
      height: 17px;
    }
    .btn-ide.vscode {
      border-color: #0078d4;
      background: #0078d4;
      color: #fff;
    }
    .btn-ide.vscode:hover {
      background: #0066b4;
      border-color: #0066b4;
    }
    .btn-ide.cursor {
      border-color: #1a1a1a;
      background: #1a1a1a;
      color: #fff;
    }
    .btn-ide.cursor:hover {
      background: #333;
      border-color: #333;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="hdr-bar">
      <header class="hdr">
        <a class="brand" href="/">
          <svg class="brand-mark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
            <g transform="translate(1.2,4.2) scale(0.0435)" fill="currentColor">
              <rect x="87" y="150" width="11" height="11"/><rect x="100" y="150" width="11" height="11"/><rect x="112" y="150" width="11" height="11"/><rect x="124" y="150" width="11" height="11"/><rect x="212" y="150" width="11" height="11"/><rect x="224" y="150" width="11" height="11"/><rect x="237" y="150" width="11" height="11"/><rect x="250" y="150" width="11" height="11"/><rect x="337" y="150" width="11" height="11"/><rect x="350" y="150" width="11" height="11"/><rect x="374" y="150" width="11" height="11"/>
              <rect x="100" y="200" width="11" height="11"/><rect x="212" y="200" width="11" height="11"/><rect x="250" y="200" width="11" height="11"/><rect x="337" y="200" width="11" height="11"/>
              <rect x="150" y="338" width="11" height="11"/><rect x="187" y="338" width="11" height="11"/><rect x="274" y="338" width="11" height="11"/><rect x="312" y="338" width="11" height="11"/>
            </g>
          </svg>
          <span>Warp</span>
        </a>
        <nav class="hdr-links">
          <a href="https://github.com/warpte-labs/warp" target="_blank" rel="noopener">GitHub</a>
          <a href="/contact">Contact</a>
        </nav>
      </header>
    </div>

    <main class="main">
      <div class="hero" id="hero" aria-label="Warp"></div>
      <div class="row">
        <a
          class="btn-ide vscode"
          href="vscode:extension/WarpteLabs.warp"
          title="Download for VS Code"
          aria-label="Download for VS Code"
        >
          <span>Download for</span>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path fill="currentColor" d="M.228341 8.36915s-.584553-.42591.11691-.99462L1.97956 5.89736s.46765-.49732.96208-.06402L18.0231 17.375v5.5344s-.0073.8691-1.1107.7731z"/>
            <path fill="currentColor" d="M4.11555 11.9367.228273 15.5089s-.399445.3004 0 .8371l1.804807 1.6593s.42867.4653 1.06194-.064l4.12109-3.1586zM10.94 11.9661l7.1291-5.50248-.0463-5.50497s-.3045-1.201443-1.3201-.576102L7.21589 9.11025z"/>
            <path fill="currentColor" d="M16.9121 23.69c.414.4283.9158.288.9158.288l5.5559-2.7672c.7113-.49.6114-1.0981.6114-1.0981V3.58803c0-.72628-.7356-.9774-.7356-.9774L18.4441.264377c-1.0522-.657345-1.7414.118171-1.7414.118171s.8865-.645032 1.3201.576102V22.8086c0 .1502-.0317.2979-.095.4308-.1267.2585-.4019.4998-1.062.3989z"/>
          </svg>
        </a>
        <a
          class="btn-ide cursor"
          href="https://cursor.com/link/extension?id=warpte.warp"
          title="Download for Cursor"
          aria-label="Download for Cursor"
        >
          <span>Download for</span>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 466.73 532.09" aria-hidden="true" fill="currentColor">
            <path d="M457.43,125.94L244.42,2.96c-6.84-3.95-15.28-3.95-22.12,0L9.3,125.94c-5.75,3.32-9.3,9.46-9.3,16.11v247.99c0,6.65,3.55,12.79,9.3,16.11l213.01,122.98c6.84,3.95,15.28,3.95,22.12,0l213.01-122.98c5.75-3.32,9.3-9.46,9.3-16.11v-247.99c0-6.65-3.55-12.79-9.3-16.11h-.01ZM444.05,151.99l-205.63,356.16c-1.39,2.4-5.06,1.42-5.06-1.36v-233.21c0-4.66-2.49-8.97-6.53-11.31L24.87,145.67c-2.4-1.39-1.42-5.06,1.36-5.06h411.26c5.84,0,9.49,6.33,6.57,11.39h-.01Z"/>
          </svg>
        </a>
      </div>
    </main>
  </div>

  <script src="/hero.js"></script>
  <script>
    (function () {
      fetch("/tiles.json")
        .then(function (r) { return r.json(); })
        .then(function (tiles) {
          var hero = document.getElementById("hero");
          var H = window.Warp && window.Warp.hero;
          if (!hero || !H) return;
          H.mount(hero, tiles);
          H.setEmpty(hero, true, tiles, { played: false, forceReplay: false });
        })
        .catch(function () {});
    })();
  </script>
</body>
</html>
