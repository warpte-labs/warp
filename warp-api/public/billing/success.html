<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Warp Pro — Welcome to Pro</title>
  <meta name="description" content="You're on Warp Pro — return to VS Code or Cursor." />
  <meta name="theme-color" content="#000000" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="canonical" href="https://warpte.com/billing/success" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      min-height: 100vh;
      background: #000;
      color: #ececec;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 16px;
      -webkit-font-smoothing: antialiased;
    }

    .shell {
      width: 99vw;
      max-width: none;
      margin: 0 auto;
      min-height: calc(100vh - 32px);
      background: #161616;
      border-radius: 20px;
      border: 1px solid #222;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .split {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 0;
    }
    @media (max-width: 720px) {
      .split { grid-template-columns: 1fr; }
    }

    .pane-w {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 28px;
      background: #161616;
      border-right: 1px solid #222;
    }
    @media (max-width: 720px) {
      .pane-w {
        border-right: 0;
        border-bottom: 1px solid #222;
        min-height: 42vh;
        padding: 32px 20px;
      }
    }

    .pane-info {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 48px 52px;
    }
    @media (max-width: 720px) {
      .pane-info { padding: 36px 28px 48px; }
    }

    .hero {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      pointer-events: none;
    }
    .hero-svg {
      width: min(440px, 100%);
      height: auto;
      aspect-ratio: 442 / 230;
      user-select: none;
      overflow: visible;
      pointer-events: auto;
      cursor: default;
      color: #7a7a7a;
    }
    .hero-svg .w-tile { fill: #7a7a7a; }
    .hero-svg .w-tile.core {
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center;
      transition: transform 140ms cubic-bezier(0.22, 1, 0.36, 1), fill 140ms ease;
    }
    .hero-svg .w-tile.particle {
      fill: #7a7a7a;
      pointer-events: none;
      transition: transform 100ms ease-out;
    }
    @media (prefers-reduced-motion: reduce) {
      .hero-svg .particle-layer { display: none; }
      .hero-svg { pointer-events: none; }
    }

    .title {
      font-size: clamp(28px, 3.8vw, 36px);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.15;
      color: #f2f2f2;
      margin-bottom: 14px;
    }

    .sub {
      font-size: 15px;
      line-height: 1.55;
      color: #8a8a8a;
      max-width: 340px;
      margin-bottom: 28px;
    }
    .sub strong {
      color: #c8c8c8;
      font-weight: 600;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn-ide {
      display: inline-flex;
      flex-direction: row;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      font-size: 13px;
      font-weight: 550;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      letter-spacing: -0.01em;
      text-decoration: none;
      border-radius: 8px;
      padding: 10px 16px;
      white-space: nowrap;
      cursor: pointer;
      border: 1px solid #ddd;
      background: #fff;
      color: #111;
      transition: background 0.12s ease, border-color 0.12s ease;
    }
    .btn-ide span { text-align: left; }
    .btn-ide:hover {
      background: #f0f0ec;
      border-color: #ccc;
    }
    .btn-ide svg {
      width: 18px;
      height: 18px;
      display: block;
      flex-shrink: 0;
    }
    .btn-ide.cursor svg {
      width: 15px;
      height: 17px;
    }
    .btn-ide.vscode {
      border-color: #0078d4;
      background: #0078d4;
      color: #fff;
    }
    .btn-ide.vscode:hover {
      background: #0066b4;
      border-color: #0066b4;
    }
    .btn-ide.cursor {
      border-color: #1a1a1a;
      background: #1a1a1a;
      color: #fff;
    }
    .btn-ide.cursor:hover {
      background: #333;
      border-color: #333;
    }

    .meta {
      margin-top: 24px;
      font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
      font-size: 11px;
      color: #5c5c5c;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="split">
      <div class="pane-w">
        <div class="hero" id="hero" aria-label="Warp"></div>
      </div>
      <div class="pane-info">
        <h1 class="title">Welcome to Pro</h1>
        <p class="sub">
          Your <strong>$5/mo</strong> subscription is active. Full Warp access in the sidebar —
          cancel anytime from Settings → Account &amp; billing.
        </p>
        <div class="row">
          <a
            class="btn-ide vscode"
            href="vscode:extension/WarpteLabs.warp"
            title="Return to VS Code"
            aria-label="Return to VS Code"
          >
            <span>Return to</span>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path fill="currentColor" d="M.228341 8.36915s-.584553-.42591.11691-.99462L1.97956 5.89736s.46765-.49732.96208-.06402L18.0231 17.375v5.5344s-.0073.8691-1.1107.7731z"/>
              <path fill="currentColor" d="M4.11555 11.9367.228273 15.5089s-.399445.3004 0 .8371l1.804807 1.6593s.42867.4653 1.06194-.064l4.12109-3.1586zM10.94 11.9661l7.1291-5.50248-.0463-5.50497s-.3045-1.201443-1.3201-.576102L7.21589 9.11025z"/>
              <path fill="currentColor" d="M16.9121 23.69c.414.4283.9158.288.9158.288l5.5559-2.7672c.7113-.49.6114-1.0981.6114-1.0981V3.58803c0-.72628-.7356-.9774-.7356-.9774L18.4441.264377c-1.0522-.657345-1.7414.118171-1.7414.118171s.8865-.645032 1.3201.576102V22.8086c0 .1502-.0317.2979-.095.4308-.1267.2585-.4019.4998-1.062.3989z"/>
            </svg>
          </a>
          <a
            class="btn-ide cursor"
            href="https://cursor.com/link/extension?id=warpte.warp"
            title="Return to Cursor"
            aria-label="Return to Cursor"
          >
            <span>Return to</span>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 466.73 532.09" aria-hidden="true" fill="currentColor">
              <path d="M457.43,125.94L244.42,2.96c-6.84-3.95-15.28-3.95-22.12,0L9.3,125.94c-5.75,3.32-9.3,9.46-9.3,16.11v247.99c0,6.65,3.55,12.79,9.3,16.11l213.01,122.98c6.84,3.95,15.28,3.95,22.12,0l213.01-122.98c5.75-3.32,9.3-9.46,9.3-16.11v-247.99c0-6.65-3.55-12.79-9.3-16.11h-.01ZM444.05,151.99l-205.63,356.16c-1.39,2.4-5.06,1.42-5.06-1.36v-233.21c0-4.66-2.49-8.97-6.53-11.31L24.87,145.67c-2.4-1.39-1.42-5.06,1.36-5.06h411.26c5.84,0,9.49,6.33,6.57,11.39h-.01Z"/>
            </svg>
          </a>
        </div>
        <p class="meta">Plan unlocks in the sidebar automatically</p>
      </div>
    </div>
  </div>

  <script src="/hero.js"></script>
  <script>
    (function () {
      fetch("/tiles.json")
        .then(function (r) { return r.json(); })
        .then(function (tiles) {
          var hero = document.getElementById("hero");
          var H = window.Warp && window.Warp.hero;
          if (!hero || !H) return;
          H.mount(hero, tiles);
          H.setEmpty(hero, true, tiles, { played: false, forceReplay: true });
        })
        .catch(function () {});
    })();
  </script>
</body>
</html>
