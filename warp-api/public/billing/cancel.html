<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Checkout cancelled — Warp</title>
  <meta name="description" content="Checkout cancelled. No charge was made." />
  <meta name="theme-color" content="#000000" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="canonical" href="https://warpte.com/billing/cancel" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      min-height: 100vh;
      background: #000;
      color: #111;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 16px;
      -webkit-font-smoothing: antialiased;
    }

    .shell {
      width: 99vw;
      max-width: none;
      margin: 0 auto;
      min-height: calc(100vh - 32px);
      background: #f4f4f2;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid #e4e4e0;
    }

    .hdr-bar {
      flex-shrink: 0;
      border-bottom: 1px solid #e4e4e0;
    }
    .hdr {
      max-width: 980px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 22px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: #111;
      font-family: ui-monospace, "Cascadia Code", "SF Mono", Consolas, monospace;
      font-size: 13px;
      font-weight: 700;
    }
    .brand-mark {
      width: 20px;
      height: 20px;
      display: block;
      color: #222;
    }
    .hdr-links {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .hdr-links a {
      color: #666;
      text-decoration: none;
      font-size: 13px;
    }
    .hdr-links a:hover { color: #111; }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 22px 64px;
    }

    .panel {
      width: 100%;
      max-width: 440px;
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 0 auto 18px;
      padding: 5px 12px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid #e4e4e0;
      font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #888;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(26px, 4vw, 36px);
      font-weight: 650;
      letter-spacing: -0.03em;
      line-height: 1.15;
      color: #111;
    }

    .lede {
      margin: 0 auto 28px;
      max-width: 380px;
      font-size: 15.5px;
      line-height: 1.55;
      color: #555;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 550;
      letter-spacing: -0.01em;
      text-decoration: none;
      border-radius: 8px;
      padding: 10px 18px;
      border: 1px solid #ddd;
      background: #fff;
      color: #111;
      transition: background 0.12s ease, border-color 0.12s ease;
    }
    .btn:hover {
      background: #f0f0ec;
      border-color: #ccc;
    }
    .btn.primary {
      background: #1a1a1a;
      border-color: #1a1a1a;
      color: #fff;
    }
    .btn.primary:hover {
      background: #333;
      border-color: #333;
    }

    .note {
      margin: 22px 0 0;
      font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
      font-size: 11.5px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="hdr-bar">
      <header class="hdr">
        <a class="brand" href="/">
          <svg class="brand-mark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
            <g transform="translate(1.2,4.2) scale(0.0435)" fill="currentColor">
              <rect x="87" y="150" width="11" height="11"/><rect x="100" y="150" width="11" height="11"/><rect x="112" y="150" width="11" height="11"/><rect x="124" y="150" width="11" height="11"/><rect x="212" y="150" width="11" height="11"/><rect x="224" y="150" width="11" height="11"/><rect x="237" y="150" width="11" height="11"/><rect x="250" y="150" width="11" height="11"/><rect x="337" y="150" width="11" height="11"/><rect x="350" y="150" width="11" height="11"/><rect x="374" y="150" width="11" height="11"/>
              <rect x="100" y="200" width="11" height="11"/><rect x="212" y="200" width="11" height="11"/><rect x="250" y="200" width="11" height="11"/><rect x="337" y="200" width="11" height="11"/>
              <rect x="150" y="338" width="11" height="11"/><rect x="187" y="338" width="11" height="11"/><rect x="274" y="338" width="11" height="11"/><rect x="312" y="338" width="11" height="11"/>
            </g>
          </svg>
          <span>Warp</span>
        </a>
        <nav class="hdr-links">
          <a href="https://github.com/warpte-labs/warp" target="_blank" rel="noopener">GitHub</a>
          <a href="/contact">Contact</a>
        </nav>
      </header>
    </div>

    <main class="main">
      <div class="panel">
        <div class="badge">No charge</div>
        <h1>Checkout cancelled</h1>
        <p class="lede">
          Nothing was charged. You can subscribe anytime from Warp →
          Settings → Account.
        </p>
        <div class="row">
          <a class="btn primary" href="/">Back to homepage</a>
          <a class="btn" href="/contact">Contact</a>
        </div>
        <p class="note">Trial still runs while you decide</p>
      </div>
    </main>
  </div>
</body>
</html>
